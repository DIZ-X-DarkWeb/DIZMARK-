<!DOCTYPE html>
<html lang="id" class="dark">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DIZMARX - Platform Produk Digital</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    darkMode: 'class',
    theme: {
      extend: {
        colors: {
          diz: {
            900: '#050a1f',
            800: '#0a1030',
            700: '#0f1745',
            600: '#15205a',
            500: '#1a2d7a',
            400: '#2040a0',
            300: '#3b6df0',
            200: '#6090ff',
            100: '#90b8ff',
          }
        },
        fontFamily: {
          goldman: ['Goldman', 'sans-serif'],
        }
      }
    }
  }
</script>
<link href="https://fonts.googleapis.com/css2?family=Goldman:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { font-family: 'Goldman', sans-serif; }
  body { 
    background: #050a1f;
    min-height: 100vh;
    overflow-x: hidden;
  }
  #particles-js {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
  }
  .content-wrap {
    position: relative;
    z-index: 1;
  }
  .glass { background: rgba(10, 16, 48, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(32, 64, 160, 0.3); }
  .glass-card { background: rgba(15, 23, 69, 0.6); backdrop-filter: blur(15px); border: 1px solid rgba(32, 64, 160, 0.4); }
  .btn-diz { background: linear-gradient(135deg, #15205a, #1a2d7a, #2040a0); transition: all 0.3s; }
  .btn-diz:hover { background: linear-gradient(135deg, #1a2d7a, #2040a0, #3b6df0); transform: scale(1.02); box-shadow: 0 0 30px rgba(32, 64, 160, 0.5); }
  .input-diz { background: rgba(10, 16, 48, 0.8); border: 1px solid rgba(32, 64, 160, 0.4); color: #90b8ff; }
  .input-diz:focus { border-color: #3b6df0; box-shadow: 0 0 20px rgba(59, 109, 240, 0.3); outline: none; }
  .gradient-text { background: linear-gradient(135deg, #6090ff, #90b8ff, #ffffff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .sidebar { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
  .pulse { animation: pulse 2s infinite; }
  @keyframes pulse { 0%, 100% { box-shadow: 0 0 20px rgba(32, 64, 160, 0.4); } 50% { box-shadow: 0 0 40px rgba(59, 109, 240, 0.8); } }
  .price-cut { text-decoration: line-through; color: #ef4444; font-size: 0.85em; }
  .animate-slide-in { animation: slideIn 0.5s ease-out; }
  @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  .animate-glow { animation: glow 3s ease-in-out infinite; }
  @keyframes glow { 0%, 100% { box-shadow: 0 0 10px rgba(59, 109, 240, 0.3); } 50% { box-shadow: 0 0 30px rgba(96, 144, 255, 0.8); } }
</style>
</head>
<body class="min-h-screen text-white">
<div id="particles-js"></div>
<div class="content-wrap">

<div id="sidebar" class="sidebar fixed top-0 right-0 w-80 h-full bg-diz-800 z-50 transform translate-x-full shadow-2xl border-l border-blue-500/30">
  <div class="p-6">
    <div class="flex justify-between items-center mb-8">
      <h3 class="text-xl gradient-text font-bold"><i class="fas fa-bars"></i> MENU</h3>
      <button onclick="toggleSidebar()" class="text-3xl text-blue-300 hover:text-white"><i class="fas fa-times"></i></button>
    </div>
    <div class="space-y-4">
      <a href="#upgrade" onclick="navigateTo('upgrade');toggleSidebar();" class="block glass-card p-4 rounded-xl hover:bg-blue-600/30 transition text-center text-lg"><i class="fas fa-crown"></i> UPGRADE</a>
      <a href="#service" onclick="navigateTo('service');toggleSidebar();" class="block glass-card p-4 rounded-xl hover:bg-blue-600/30 transition text-center text-lg"><i class="fas fa-tools"></i> SERVICE</a>
      <a href="#sign" onclick="navigateTo('sign');toggleSidebar();" class="block glass-card p-4 rounded-xl hover:bg-blue-600/30 transition text-center text-lg"><i class="fas fa-user-plus"></i> SIGN</a>
    </div>
  </div>
</div>

<header class="fixed top-0 w-full z-40 glass px-4 py-3">
  <div class="max-w-7xl mx-auto flex justify-between items-center">
    <img src="https://i.ibb.co.com/ZRNQBwrV/IMG-20260428-153620.png" alt="DIZMARX" class="h-12 w-12 object-cover">
    <div class="flex items-center gap-4">
      <div id="header-buttons" class="flex gap-3">
        <button onclick="navigateTo('sign')" class="btn-diz px-6 py-2 rounded-xl pulse font-bold text-sm"><i class="fas fa-user-plus"></i> SIGN UP FREE</button>
      </div>
      <button onclick="toggleSidebar()" class="text-3xl text-blue-300 hover:text-white transition"><i class="fas fa-bars"></i></button>
    </div>
  </div>
</header>

<main id="main-content" class="pt-24 pb-16 px-4 max-w-7xl mx-auto">
  <div id="dynamic-content">
    <div class="text-center py-16 animate-slide-in">
      <img src="https://i.ibb.co.com/ZRNQBwrV/IMG-20260428-153620.png" alt="DIZMARX" class="h-32 w-32 mx-auto rounded-full mb-6 animate-glow">
      <h1 class="text-6xl md:text-8xl font-bold gradient-text mb-6">BUY ITEM</h1>
      <p class="text-xl text-blue-200/80 mb-12 max-w-2xl mx-auto">Buat project untuk dijual. Produk digital. Bagikan di media sosial dan dark web.</p>
      <button onclick="navigateTo('sign')" class="btn-diz px-10 py-4 rounded-xl text-xl font-bold pulse">MULAI</button>
      <div class="max-w-xl mx-auto mt-12">
        <div class="input-diz rounded-xl p-3 flex items-center">
          <span class="text-blue-300 font-bold mr-2">dizmarx/</span>
          <input type="text" id="search-url" placeholder="linkuseryoudizmarx" class="bg-transparent flex-1 text-blue-200 outline-none">
          <button onclick="searchUrl()" class="text-blue-400 hover:text-white ml-2"><i class="fas fa-search"></i></button>
        </div>
      </div>
    </div>
  </div>
</main>

<footer class="glass border-t border-blue-500/20 py-8 px-4 mt-16">
  <div class="max-w-7xl mx-auto">
    <div class="flex flex-col items-center gap-6">
      <img src="https://i.ibb.co.com/ZRNQBwrV/IMG-20260428-153620.png" alt="DIZMARX" class="h-16 w-16 rounded-full">
      <div class="flex gap-6 text-3xl">
        <a href="https://vm.tiktok.com/ZS98d811wU23L-6JMzD" target="_blank" class="text-white hover:text-blue-400 transition"><i class="fab fa-tiktok"></i></a>
        <a href="https://wa.me/6282122598130" target="_blank" class="text-white hover:text-green-400 transition"><i class="fab fa-whatsapp"></i></a>
      </div>
      <div class="flex flex-wrap justify-center gap-6 text-sm text-blue-300">
        <span onclick="navigateTo('about')" class="cursor-pointer hover:text-white transition"><i class="fas fa-info-circle"></i> About Us</span>
        <span onclick="navigateTo('terms')" class="cursor-pointer hover:text-white transition"><i class="fas fa-file-contract"></i> Terms & Conditions</span>
        <span onclick="navigateTo('contact')" class="cursor-pointer hover:text-white transition"><i class="fas fa-envelope"></i> Contact Us</span>
        <span onclick="navigateTo('privacy')" class="cursor-pointer hover:text-white transition"><i class="fas fa-shield-alt"></i> Privacy</span>
      </div>
      <div class="flex flex-wrap justify-center gap-6 text-xs text-blue-400 mt-2">
        <span onclick="navigateTo('privacy-policy')" class="cursor-pointer hover:text-white transition">Privacy Policy</span>
        <span onclick="navigateTo('sitemap')" class="cursor-pointer hover:text-white transition">Sitemap</span>
        <span onclick="navigateTo('terms-of-use')" class="cursor-pointer hover:text-white transition">Terms of Use</span>
      </div>
      <p class="text-blue-400 text-sm mt-4">Copyrights 2026 dizofficial</p>
    </div>
  </div>
</footer>

<div id="modal-overlay" class="fixed inset-0 bg-black/80 z-50 hidden flex items-center justify-center" onclick="closeModal()">
  <div id="modal-content" class="glass-card p-8 rounded-2xl max-w-lg w-full mx-4 max-h-[90vh] overflow-y-auto" onclick="event.stopPropagation()"></div>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
<script>
window.navigateTo = function(page) { window.location.hash = page; };
window.toggleSidebar = function() { var s = document.getElementById("sidebar"); if (s.style.transform === "translateX(0px)") { s.style.transform = "translateX(100%)"; } else { s.style.transform = "translateX(0px)"; } };
window.searchUrl = function() { var u = document.getElementById("search-url").value.trim(); if (u) { window.location.hash = "view/" + u; } };
window.closeModal = function() { document.getElementById("modal-overlay").classList.add("hidden"); };
particlesJS('particles-js', {
  particles: {
    number: { value: 80, density: { enable: true, value_area: 800 } },
    color: { value: '#3b6df0' },
    shape: { type: 'circle' },
    opacity: { value: 0.5, random: true },
    size: { value: 3, random: true },
    line_linked: { enable: true, distance: 150, color: '#2040a0', opacity: 0.3, width: 1 },
    move: { enable: true, speed: 1.5, direction: 'none', random: true, straight: false, out_mode: 'out', bounce: false }
  },
  interactivity: {
    detect_on: 'canvas',
    events: { onhover: { enable: true, mode: 'grab' }, onclick: { enable: true, mode: 'push' }, resize: true },
    modes: { grab: { distance: 140, line_linked: { opacity: 0.8 } }, push: { particles_nb: 4 } }
  },
  retina_detect: true
});





</script>

<script type="module" src="js/supabase.js"></script>
<script type="module" src="js/auth.js"></script>
<script type="module" src="js/app.js"></script>
</body>
</html>
